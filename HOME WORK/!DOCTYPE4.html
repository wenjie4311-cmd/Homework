<!DOCTYPE html>
<html>
<head>
    <title>Exercise 4 - Class Selector</title>
    <style>
        .highlight {
            color: purple;
            font-size: 18px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <p class="highlight">This is the first paragraph with class selector.</p >
    <p class="highlight">This is the second paragraph with the same class.</p >
    <p class="highlight">Class selectors allow multiple elements to share the same style.</p >
</body>
</html>
